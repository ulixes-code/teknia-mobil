<!DOCTYPE html>
<html>
<head>
  <title>Usuario</title>
  <link rel="stylesheet" href="estilos.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<div class="card">
  <h2>📍 Transporte en camino</h2>
  <p id="info">Calculando distancia...</p>

  <button onclick="volver()">⬅ Volver</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
function volver() {
  window.location.href = "index.html";
}

// 🔥 MÁS ZOOM Y MEJOR MAPA
var map = L.map('map').setView([22.1565, -100.9855], 17);

L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png')
  .addTo(map);

var markerTransporte = L.marker([22.1565, -100.9855]).addTo(map);
var markerUsuario;

var userLat, userLng;

// 📍 Ubicación del usuario
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(function(pos) {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    markerUsuario = L.marker([userLat, userLng]).addTo(map)
      .bindPopup("Tú estás aquí")
      .openPopup();
  });
}

// 📏 Distancia
function calcularDistancia(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) ** 2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

let lastLat = null;
let lastLng = null;

// 🚐 Movimiento suave
setInterval(() => {
  fetch('http://localhost:3000/ubicacion')
    .then(res => res.json())
    .then(data => {

      if (!data.lat || !data.lng) return;

      // Primera vez
      if (lastLat === null) {
        lastLat = data.lat;
        lastLng = data.lng;
        markerTransporte.setLatLng([data.lat, data.lng]);
        return;
      }

      let steps = 20;
      let i = 0;

      let deltaLat = (data.lat - lastLat) / steps;
      let deltaLng = (data.lng - lastLng) / steps;

      let animacion = setInterval(() => {
        lastLat += deltaLat;
        lastLng += deltaLng;

        markerTransporte.setLatLng([lastLat, lastLng]);
        map.setView([lastLat, lastLng], 17);

        i++;
        if (i >= steps) clearInterval(animacion);
      }, 100);

      // 📏 Distancia
      if (userLat && userLng) {
        let distancia = calcularDistancia(
          userLat, userLng,
          data.lat, data.lng
        );

        let texto = "📏 Distancia: " + distancia.toFixed(2) + " km";

        if (distancia < 0.5) {
          texto += "<br>🚐 Ya casi llega";
        }

        document.getElementById("info").innerHTML = texto;
      }

    });
}, 5000);
</script>

</body>
</html>
